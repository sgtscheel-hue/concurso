<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Simulado Diário</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    padding:40px;
}
.container{
    background:white;
    width:900px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}
button{
    padding:10px 20px;
    margin-top:20px;
    cursor:pointer;
}
.option{ margin:8px 0; }
.hidden{ display:none; }
.aprovado{ color:green; font-size:22px; font-weight:bold; }
.reprovado{ color:red; font-size:20px; font-weight:bold; }
canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}
</style>
</head>
<body>

<canvas id="fogos"></canvas>

<div class="container">
<h2>Simulado Diário</h2>

<div id="quiz"></div>
<button id="nextBtn">Próxima (Enter)</button>

<div id="resultado" class="hidden"></div>
</div>

<!-- CARREGA O BANCO -->
<script src="simulado_diario.js"></script>

<script>

if(!window.banco_simulado_novo){
    document.body.innerHTML = "<h2>Erro ao carregar banco de questões.</h2>";
    throw new Error("Banco não carregado.");
}

const questoes = window.banco_simulado_novo;

let indice = 0;
let respostas = [];

const quizDiv = document.getElementById("quiz");
const nextBtn = document.getElementById("nextBtn");
const resultadoDiv = document.getElementById("resultado");

function pesoMateria(materia){
    return materia === "Conhecimentos Específicos" ? 3 : 1;
}

function mostrarQuestao(){

    const q = questoes[indice];

    quizDiv.innerHTML = `
        <p><strong>${indice+1} / ${questoes.length}</strong></p>
        <p><strong>${q.materia}</strong> - ${q.assunto}</p>
        <p>${q.enunciado}</p>

        ${["a","b","c","d","e"].map(letra => `
            <div class="option">
                <input type="radio" name="opcao" value="${letra}" id="${letra}">
                <label for="${letra}">${q[letra]}</label>
            </div>
        `).join("")}
    `;
}

function calcularResultado(){

    let total = 0;
    let pontos = 0;
    let materias = {};
    let erros = [];
    let assuntosRevisar = new Set();

    questoes.forEach((q,i)=>{

        let peso = pesoMateria(q.materia);
        total += peso;

        if(!materias[q.materia]){
            materias[q.materia] = {acertos:0,total:0};
        }

        materias[q.materia].total += peso;

        if(respostas[i] === q.correta){
            pontos += peso;
            materias[q.materia].acertos += peso;
        }else{
            erros.push(`Questão ${q.id} - ${q.assunto}`);
            assuntosRevisar.add(q.assunto);
        }
    });

    let percentual = (pontos/total)*100;

    let eliminado = false;
    for(let m in materias){
        if(materias[m].acertos === 0){
            eliminado = true;
        }
    }

    quizDiv.classList.add("hidden");
    nextBtn.classList.add("hidden");
    resultadoDiv.classList.remove("hidden");

    let html = `<h3>Resultado Final</h3>`;
    html += `<p><strong>Nota:</strong> ${pontos} / ${total} (${percentual.toFixed(2)}%)</p>`;

    html += `<h4>Percentual por Matéria:</h4>`;
    for(let m in materias){
        let perc = (materias[m].acertos/materias[m].total)*100;
        html += `<p>${m}: ${perc.toFixed(2)}%</p>`;
    }

    if(percentual >= 60 && !eliminado){
        html += `<p class="aprovado">🎉 PARABÉNS! VOCÊ FOI APROVADO!</p>`;
        iniciarFogos();
    }else{
        html += `<p class="reprovado">Você precisa melhorar mais. Continue estudando!</p>`;

        html += `<h4>Questões Erradas:</h4><ul>`;
        erros.forEach(e => html += `<li>${e}</li>`);
        html += `</ul>`;

        html += `<h4>Assuntos para Revisar:</h4><ul>`;
        assuntosRevisar.forEach(a => html += `<li>${a}</li>`);
        html += `</ul>`;
    }

    resultadoDiv.innerHTML = html;
}

nextBtn.addEventListener("click",()=>{
    const selecionada = document.querySelector("input[name='opcao']:checked");

    if(!selecionada){
        alert("Selecione uma alternativa.");
        return;
    }

    respostas[indice] = selecionada.value;
    indice++;

    if(indice < questoes.length){
        mostrarQuestao();
    }else{
        calcularResultado();
    }
});

document.addEventListener("keydown",(e)=>{
    if(e.key === "Enter"){
        nextBtn.click();
    }
});

mostrarQuestao();

/* ================= FOGOS PROFISSIONAIS ================= */

function iniciarFogos(){

    const canvas = document.getElementById("fogos");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particulas = [];

    function criarParticula(){
        return {
            x: canvas.width/2,
            y: canvas.height/2,
            radius: Math.random()*3+2,
            color: `hsl(${Math.random()*360},100%,50%)`,
            speedX:(Math.random()-0.5)*8,
            speedY:(Math.random()-0.5)*8,
            life:100
        }
    }

    for(let i=0;i<250;i++){
        particulas.push(criarParticula());
    }

    function animar(){
        ctx.fillStyle="rgba(0,0,0,0.2)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        particulas.forEach(p=>{
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
            ctx.fillStyle=p.color;
            ctx.fill();

            p.x+=p.speedX;
            p.y+=p.speedY;
            p.life--;
        });

        particulas = particulas.filter(p=>p.life>0);

        if(particulas.length>0){
            requestAnimationFrame(animar);
        }
    }

    animar();
}

</script>
</body>
</html>
