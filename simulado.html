<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Independente - SEDUC RO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="simulado_diario.js"></script>
</head>
<body class="bg-gray-100 p-4 font-sans">

    <div class="max-w-4xl mx-auto">
        <div class="bg-white p-6 rounded-t-2xl shadow-sm border-b flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-blue-900">Simulado Técnico Educacional</h1>
                <p class="text-sm text-gray-500" id="info-materia">Carregando...</p>
            </div>
            <div class="text-right">
                <span id="progresso-texto" class="text-sm font-bold text-blue-600">Questão 1/50</span>
                <div class="w-32 h-2 bg-gray-200 rounded-full mt-1">
                    <div id="barra-progresso" class="h-full bg-blue-600 rounded-full transition-all" style="width: 2%"></div>
                </div>
            </div>
        </div>

        <main id="area-questao" class="bg-white p-8 shadow-xl min-h-[450px]">
            </main>

        <footer class="bg-gray-50 p-6 rounded-b-2xl border-t flex justify-between">
            <button onclick="navegar(-1)" id="btn-ant" class="px-6 py-2 font-bold text-gray-400 hover:text-gray-700 disabled:opacity-0">
                ← Anterior
            </button>
            <button onclick="navegar(1)" id="btn-prox" class="bg-blue-600 text-white px-10 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md">
                Próxima →
            </button>
        </footer>
    </div>

    <script>
        let atual = 0;
        let respostas = {}; // Guarda { idQuestao: 'a' }

        function render() {
            const q = banco_simulado_novo[atual];
            const container = document.getElementById('area-questao');
            
            // Atualiza Topo
            document.getElementById('progresso-texto').innerText = `Questão ${atual + 1}/${banco_simulado_novo.length}`;
            document.getElementById('info-materia').innerText = q.materia + " > " + q.assunto;
            document.getElementById('barra-progresso').style.width = ((atual + 1) / banco_simulado_novo.length * 100) + "%";
            
            // Botão Finalizar vs Próxima
            const btnProx = document.getElementById('btn-prox');
            if (atual === banco_simulado_novo.length - 1) {
                btnProx.innerText = "FINALIZAR SIMULADO";
                btnProx.className = "bg-green-600 text-white px-10 py-2 rounded-lg font-bold hover:bg-green-700 shadow-md";
                btnProx.onclick = finalizar;
            } else {
                btnProx.innerText = "Próxima →";
                btnProx.className = "bg-blue-600 text-white px-10 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md";
                btnProx.onclick = () => navegar(1);
            }

            document.getElementById('btn-ant').disabled = (atual === 0);

            container.innerHTML = `
                <div class="animate-in fade-in duration-500">
                    <h2 class="text-xl text-gray-800 leading-relaxed mb-8">${q.enunciado}</h2>
                    <div class="space-y-3">
                        ${['a', 'b', 'c', 'd', 'e'].map(l => `
                            <label class="flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all ${respostas[q.id] === l ? 'border-blue-500 bg-blue-50' : 'border-gray-100 hover:bg-gray-50'}">
                                <input type="radio" name="resp" value="${l}" class="hidden" 
                                       ${respostas[q.id] === l ? 'checked' : ''} 
                                       onchange="gravar('${q.id}', '${l}')">
                                <span class="w-8 h-8 flex items-center justify-center rounded-full ${respostas[q.id] === l ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'} font-bold mr-4 text-sm">${l.toUpperCase()}</span>
                                <span class="text-gray-700">${q[l]}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function gravar(id, letra) {
            respostas[id] = letra;
            render(); // Re-renderiza para aplicar estilo visual de selecionado
        }

        function navegar(dir) {
            atual += dir;
            render();
            window.scrollTo(0,0);
        }

        function finalizar() {
            let pontos = 0;
            let acertosMateria = { 
                "Língua Portuguesa": 0, "História de RO": 0, "Geografia de RO": 0, 
                "Informática": 0, "Conhecimentos Específicos": 0 
            };
            let errosAssunto = new Set();

            banco_simulado_novo.forEach(q => {
                if (respostas[q.id] === q.correta) {
                    acertosMateria[q.materia]++;
                    pontos += (q.materia === "Conhecimentos Específicos") ? 3 : 1;
                } else {
                    errosAssunto.add(q.assunto);
                }
            });

            const zeradas = Object.keys(acertosMateria).filter(m => acertosMateria[m] === 0);
            const aprovado = (zeradas.length === 0 && pontos >= 60);

            exibirResultado(pontos, aprovado, zeradas, acertosMateria, errosAssunto);
        }

        function exibirResultado(nota, aprovado, zeradas, acertos, revisao) {
            document.body.innerHTML = `
                <div class="max-w-2xl mx-auto mt-10 bg-white rounded-3xl shadow-2xl overflow-hidden p-8 text-center">
                    <h2 class="text-2xl font-bold mb-2 text-gray-700">Resultado do Simulado</h2>
                    <div class="text-8xl font-black my-6 ${aprovado ? 'text-green-600' : 'text-red-600'}">${nota}</div>
                    <p class="text-xl font-bold uppercase mb-8">${aprovado ? '✅ Aprovado!' : '❌ Reprovado'}</p>
                    
                    <div class="grid grid-cols-1 gap-4 text-left mb-8">
                        <div class="bg-gray-50 p-6 rounded-2xl">
                            <h3 class="font-bold border-b pb-2 mb-4">Desempenho por Matéria</h3>
                            ${Object.entries(acertos).map(([m, v]) => `
                                <div class="flex justify-between mb-2 text-sm">
                                    <span>${m}</span>
                                    <span class="font-bold ${v === 0 ? 'text-red-500' : 'text-gray-700'}">${v} acertos</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    ${zeradas.length > 0 ? `
                        <div class="bg-red-100 text-red-700 p-4 rounded-xl mb-6 font-medium text-sm">
                            Atenção: Você zerou <strong>${zeradas.join(', ')}</strong> e foi eliminado.
                        </div>
                    ` : ''}

                    <div class="text-left bg-amber-50 p-6 rounded-2xl border border-amber-100 mb-8">
                        <h3 class="text-amber-800 font-bold mb-2 italic">Revisar estes assuntos:</h3>
                        <p class="text-xs text-amber-700 leading-relaxed">${Array.from(revisao).join(', ')}</p>
                    </div>

                    <button onclick="location.reload()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700">
                        TENTAR NOVAMENTE
                    </button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
